<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VELTIER 로그인</title>
    <meta name="description" content="VELTIER 로그인, 회원가입, 이메일 인증 로그인 화면." />
    <link rel="canonical" href="https://jinkyung1134-commits.github.io/Caseform/auth.html" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="VELTIER 로그인" />
    <meta property="og:description" content="Google, Apple, Kakao, 이메일 인증으로 VELTIER에 로그인하세요." />
    <meta property="og:image" content="https://jinkyung1134-commits.github.io/Caseform/assets/hero-cases.png" />
    <meta property="og:url" content="https://jinkyung1134-commits.github.io/Caseform/auth.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="stylesheet" href="styles.css?v=20260602-auth-page" />
  </head>
  <body class="auth-page gold-finish">
    <header class="site-header" aria-label="상단 메뉴">
      <nav class="nav">
        <button class="mobile-menu-button" id="mobile-menu-button" type="button" aria-label="메뉴 열기" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <a class="brand" href="index.html" data-home-link data-setting="brandName">VELTIER</a>
        <div class="nav-links" aria-label="주요 메뉴">
          <a href="products.html" data-products-link>컬렉션</a>
          <a href="product.html?id=0#reviews">리뷰</a>
          <a href="account.html" data-account-link>마이페이지</a>
          <a href="policies.html#shipping" data-support-link>배송</a>
        </div>
        <div class="mobile-nav-actions" aria-label="빠른 메뉴">
          <a class="mobile-icon-button is-account" href="auth.html?next=account.html" data-account-icon aria-label="마이페이지"></a>
          <button class="mobile-icon-button is-bag" type="button" data-cart-open aria-label="장바구니"></button>
        </div>
      </nav>
    </header>

    <main class="account-page-main auth-page-main">
      <section class="account-hero" aria-labelledby="auth-title">
        <p class="eyebrow">Sign in</p>
        <h1 id="auth-title">로그인</h1>
        <p>필요한 순간에만 로그인하고, 완료 후 원래 보던 화면으로 돌아갑니다.</p>
      </section>

      <section class="account-shell auth-shell" aria-label="로그인">
        <div class="account-panel auth-panel">
          <div class="social-auth-grid" aria-label="소셜 로그인">
            <button class="button oauth-button" type="button" data-oauth-provider="google">
              <span class="provider-mark provider-google" aria-hidden="true">G</span>
              Google로 계속하기
            </button>
            <button class="button oauth-button" type="button" data-oauth-provider="apple">
              <span class="provider-mark provider-apple" aria-hidden="true">A</span>
              Apple로 계속하기
            </button>
            <button class="button oauth-button" type="button" data-oauth-provider="kakao">
              <span class="provider-mark provider-kakao" aria-hidden="true">K</span>
              Kakao로 계속하기
            </button>
          </div>

          <div class="auth-divider" aria-hidden="true"><span>또는 이메일로</span></div>

          <div class="account-tabs auth-tabs" role="tablist" aria-label="로그인 방식">
            <button class="is-active" type="button" data-auth-tab="otp">이메일 인증</button>
            <button type="button" data-auth-tab="password">비밀번호</button>
            <button type="button" data-auth-tab="signup">회원가입</button>
          </div>

          <form class="account-form" id="otp-form">
            <label>
              <span>이메일</span>
              <input type="email" name="email" autocomplete="email" required />
            </label>
            <button class="button primary" type="submit">인증 링크 받기</button>
          </form>

          <form class="account-form is-hidden" id="login-form">
            <label>
              <span>이메일</span>
              <input type="email" name="email" autocomplete="email" required />
            </label>
            <label>
              <span>비밀번호</span>
              <input type="password" name="password" autocomplete="current-password" required />
            </label>
            <button class="button primary" type="submit">로그인</button>
          </form>

          <form class="account-form is-hidden" id="signup-form">
            <label>
              <span>이름</span>
              <input type="text" name="name" autocomplete="name" required />
            </label>
            <label>
              <span>이메일</span>
              <input type="email" name="email" autocomplete="email" required />
            </label>
            <label>
              <span>비밀번호</span>
              <input type="password" name="password" autocomplete="new-password" minlength="4" required />
            </label>
            <label>
              <span>연락처</span>
              <input type="tel" name="phone" autocomplete="tel" />
            </label>
            <button class="button primary" type="submit">가입하기</button>
          </form>

          <p class="form-status" id="auth-status" aria-live="polite"></p>
        </div>

        <aside class="account-panel auth-guide-panel" aria-label="로그인 안내">
          <div class="account-panel-head">
            <p class="eyebrow">Recommended</p>
            <h2>VELTIER 로그인 구성</h2>
          </div>
          <div class="auth-method-list">
            <article>
              <strong>국내</strong>
              <span>Kakao를 우선 사용하고, Google과 Apple을 보조로 둡니다.</span>
            </article>
            <article>
              <strong>글로벌</strong>
              <span>Google, Apple, 이메일 인증을 기본으로 사용합니다.</span>
            </article>
            <article>
              <strong>비회원 주문</strong>
              <span>결제/주문 DB 정책 정리 후 별도 단계에서 활성화합니다.</span>
            </article>
          </div>
        </aside>
      </section>
    </main>

    <script src="site-config.js?v=20260602-responsive-ui"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=20260602-supabase-live"></script>
    <script src="shop.js?v=20260602-auth-page"></script>
    <script src="auth.js?v=20260602-auth-page"></script>
  </body>
</html>
