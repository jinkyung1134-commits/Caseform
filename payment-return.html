  <body class="checkout-page gold-finish">
    <header class="site-header" aria-label="상단 메뉴">
      <nav class="nav">
        <button class="mobile-menu-button" id="mobile-menu-button" type="button" aria-label="메뉴 열기" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <a class="brand" href="index.html" data-home-link data-setting="brandName">VELTIER</a>
        <div class="nav-links" aria-label="주요 메뉴">
          <a href="products.html" data-products-link>컬렉션</a>
          <a href="product.html?id=0#reviews">리뷰</a>
          <a href="account.html" data-account-link>마이페이지</a>
          <a href="policies.html#shipping" data-support-link>배송</a>
        </div>
        <div class="mobile-nav-actions" aria-label="빠른 메뉴">
          <a class="mobile-icon-button is-account" href="account.html" data-account-icon aria-label="마이페이지"></a>
          <button class="mobile-icon-button is-bag" type="button" data-cart-open aria-label="장바구니"></button>
        </div>
      </nav>
    </header>

    <main class="checkout-main payment-return-main">
      <section class="checkout-hero" aria-labelledby="payment-return-title">
        <p class="eyebrow">Payment</p>
        <h1 id="payment-return-title">결제 결과를 확인하고 있어요.</h1>
        <p id="payment-return-copy">잠시만 기다려주세요.</p>
      </section>

      <section class="checkout-panel payment-result-panel" aria-live="polite">
        <p class="eyebrow" id="payment-return-provider">Toss Payments</p>
        <h2 id="payment-result-title">결제 승인 확인 중</h2>
        <p id="payment-result-message">결제 승인 정보를 서버에서 검증하고 있습니다.</p>
        <div class="payment-result-meta" id="payment-result-meta"></div>
        <div class="payment-result-actions">
          <a class="button primary" href="account.html" data-account-link>마이페이지</a>
          <a class="button secondary" href="products.html" data-products-link>컬렉션 보기</a>
        </div>
      </section>
    </main>

    <script src="site-config.js?v=20260602-responsive-ui"></script>
