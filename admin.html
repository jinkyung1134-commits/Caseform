<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caseform Admin</title>
    <link rel="stylesheet" href="styles.css?v=20260531-product-pages" />
    <link rel="stylesheet" href="admin.css?v=20260531-product-pages" />
  </head>
  <body class="admin-body gold-finish">
    <header class="admin-header">
      <nav class="admin-nav" aria-label="관리자 메뉴">
        <a class="brand" href="index.html">Caseform</a>
        <div class="admin-nav-actions">
          <a class="button secondary" href="index.html">홈페이지</a>
          <button class="button primary" type="submit" form="settings-form">저장</button>
        </div>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="admin-title">
        <p class="eyebrow">Admin Console</p>
        <h1>사이트 설정</h1>
        <p>블랙 배경은 유지하고, 사진 경계의 골드 마감선과 화면 문구를 조정합니다.</p>
      </section>

      <form class="admin-layout" id="settings-form">
        <section class="admin-panel" aria-labelledby="brand-panel">
          <div class="panel-heading">
            <h2 id="brand-panel">브랜드</h2>
            <span>기본 정보</span>
          </div>
          <label>
            <span>브랜드명</span>
            <input name="brandName" type="text" />
          </label>
          <label>
            <span>브라우저 제목</span>
            <input name="pageTitle" type="text" />
          </label>
        </section>

        <section class="admin-panel" aria-labelledby="hero-panel">
          <div class="panel-heading">
            <h2 id="hero-panel">첫 화면</h2>
            <span>상품 슬라이드</span>
          </div>
          <label>
            <span>상품 슬라이드 전환(초)</span>
            <input name="heroSlideInterval" type="number" min="2" max="30" step="1" />
          </label>
          <label>
            <span>전환 효과 시간(ms)</span>
            <input name="heroTransitionDuration" type="number" min="150" max="1800" step="50" />
          </label>
          <label>
            <span>사진 표시 방식</span>
            <select name="heroMediaMode">
              <option value="blend">배경 블렌딩</option>
              <option value="fill">전체 사진 채우기</option>
              <option value="focus">제품 중심</option>
            </select>
          </label>
          <label>
            <span>배경 어둡기</span>
            <input name="heroMediaDarkness" type="range" min="0" max="90" step="1" />
          </label>
          <label>
            <span>가장자리 페이드</span>
            <input name="heroMediaFade" type="range" min="0" max="100" step="1" />
          </label>
        </section>

        <section class="admin-panel" aria-labelledby="theme-panel">
          <div class="panel-heading">
            <h2 id="theme-panel">블랙&골드</h2>
            <span>화면 마감</span>
          </div>
          <label class="admin-toggle">
            <input name="goldFinish" type="checkbox" />
            <span>사진 경계 골드 마감선</span>
          </label>
          <div class="color-grid">
            <label>
              <span>골드</span>
              <input name="accent" type="color" />
            </label>
            <label>
              <span>하이라이트</span>
              <input name="accentSoft" type="color" />
            </label>
            <label>
              <span>딥 골드</span>
              <input name="accentWarm" type="color" />
            </label>
          </div>
          <div class="finish-preview" aria-hidden="true">
            <span></span>
          </div>
        </section>

        <section class="admin-panel" aria-labelledby="copy-panel">
          <div class="panel-heading">
            <h2 id="copy-panel">버튼과 섹션</h2>
            <span>문구</span>
          </div>
          <label>
            <span>메인 버튼</span>
            <input name="primaryCta" type="text" />
          </label>
          <label>
            <span>보조 버튼</span>
            <input name="secondaryCta" type="text" />
          </label>
          <label>
            <span>컬렉션 제목</span>
            <textarea name="collectionTitle" rows="2"></textarea>
          </label>
        </section>

        <section class="admin-panel products-panel" aria-labelledby="products-panel">
          <div class="panel-heading">
            <h2 id="products-panel">상품</h2>
            <span>미디어와 상세</span>
          </div>
          <div class="admin-products" id="admin-products"></div>
        </section>

        <aside class="admin-preview" aria-labelledby="preview-title">
          <div class="panel-heading">
            <h2 id="preview-title">미리보기</h2>
            <span id="save-status">저장 전</span>
          </div>
          <div class="preview-frame">
            <div class="preview-copy">
              <strong id="preview-title-text">케이스는 보호구가 아니라 세팅입니다.</strong>
              <small id="preview-subtitle">무광 블랙과 사진 경계의 골드 마감선.</small>
            </div>
            <div class="preview-photo" id="preview-photo">
              <span></span>
            </div>
          </div>
          <div class="admin-actions">
            <button class="button primary" type="submit">설정 저장</button>
            <button class="button secondary" id="reset-button" type="button">초기화</button>
          </div>
        </aside>
      </form>
    </main>

    <script src="site-config.js?v=20260531-product-pages"></script>
    <script src="admin.js?v=20260531-product-pages"></script>
  </body>
</html>
